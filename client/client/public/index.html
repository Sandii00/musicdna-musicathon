<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MusicDNA - Trace The Roots</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #000;
      color: #fff;
      min-height: 100vh;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    
    .header {
      text-align: center;
      margin-bottom: 50px;
    }
    
    .logo { font-size: 3em; margin-bottom: 10px; }
    .title { font-size: 2.5em; font-weight: bold; letter-spacing: 3px; margin-bottom: 5px; }
    .subtitle { color: #888; font-size: 0.9em; letter-spacing: 2px; }
    
    .tagline {
      color: #999;
      margin-top: 20px;
      font-size: 0.95em;
      line-height: 1.6;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
    }
    
    .search-box {
      display: flex;
      gap: 10px;
      margin: 40px 0;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }
    
    input {
      flex: 1;
      padding: 15px;
      border: 1px solid #333;
      background: #111;
      color: #fff;
      font-size: 1em;
      border-radius: 3px;
    }
    
    input::placeholder { color: #666; }
    
    button {
      padding: 15px 30px;
      background: #fff;
      color: #000;
      border: none;
      font-weight: bold;
      cursor: pointer;
      border-radius: 3px;
      font-size: 1em;
      transition: background 0.2s;
    }
    
    button:hover { background: #ddd; }
    
    .results {
      margin-top: 30px;
      max-width: 800px;
      margin-left: auto;
      margin-right: auto;
    }
    
    .result-item {
      padding: 15px;
      background: #111;
      border-left: 3px solid #fff;
      margin: 10px 0;
      cursor: pointer;
      transition: background 0.2s;
    }
    
    .result-item:hover { background: #222; }
    .result-item strong { display: block; margin-bottom: 5px; }
    .result-item small { color: #888; }
    
    .artist-profile {
      background: #111;
      padding: 20px;
      margin-top: 30px;
      border-left: 3px solid #fff;
      max-width: 800px;
      margin-left: auto;
      margin-right: auto;
      display: flex;
      gap: 20px;
      align-items: center;
    }
    
    .artist-profile img {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      object-fit: cover;
    }
    
    .artist-info h3 { margin-bottom: 10px; font-size: 1.3em; }
    .artist-info p { color: #888; margin: 5px 0; font-size: 0.9em; }
    .genres { color: #999; margin-top: 10px; }
    
    .dna-section {
      background: #111;
      padding: 20px;
      margin-top: 30px;
      border-left: 3px solid #fff;
      max-width: 800px;
      margin-left: auto;
      margin-right: auto;
    }
    
    .dna-section h3 { margin-bottom: 15px; font-size: 1.2em; }
    .dna-section strong { display: block; margin-top: 15px; margin-bottom: 10px; }
    .dna-section ul { list-style: none; margin-left: 0; }
    .dna-section li {
      padding: 10px;
      background: #222;
      margin: 8px 0;
      border-radius: 3px;
      color: #ccc;
      font-size: 0.95em;
      line-height: 1.5;
    }
    
    .audio-button {
      background: #1DB954;
      color: #fff;
      padding: 8px 16px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      font-size: 0.9em;
      margin-top: 10px;
    }
    
    .audio-button:hover { background: #1ed760; }
    
    .influences-section {
      background: #111;
      padding: 20px;
      margin-top: 30px;
      border-left: 3px solid #fff;
      max-width: 800px;
      margin-left: auto;
      margin-right: auto;
    }
    
    .influences-section h3 { margin-bottom: 15px; }
    .influence-item {
      padding: 12px;
      background: #222;
      margin: 8px 0;
      border-radius: 3px;
      border-left: 2px solid #fff;
    }
    
    .influence-item strong { display: block; margin-bottom: 3px; }
    .influence-item small { color: #888; display: block; margin-top: 3px; }
    
    .tours-section {
      background: #111;
      padding: 20px;
      margin-top: 30px;
      border-left: 3px solid #fff;
      max-width: 800px;
      margin-left: auto;
      margin-right: auto;
    }
    
    .tours-section h3 { margin-bottom: 15px; }
    .tour-item {
      padding: 12px;
      background: #222;
      margin: 8px 0;
      border-radius: 3px;
    }
    
    .tour-item strong { display: block; }
    .tour-item small { color: #888; display: block; margin-top: 5px; }
    
    .loading { text-align: center; padding: 20px; color: #888; }
    .error { color: #f00; padding: 15px; background: #1a0000; border-left: 3px solid #f00; margin: 10px 0; }
    
    @media (max-width: 768px) {
      .artist-profile { flex-direction: column; text-align: center; }
      .artist-profile img { width: 120px; height: 120px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">🎵</div>
      <div class="title">MUSICDNA</div>
      <div class="subtitle">EST. LYRICAL GENEALOGY</div>
      <div class="tagline">
        Every song carries the DNA of the music that came before it.<br>
        Search a track and we'll decode its lyrical genome, then surface the influences hidden in its lineage.
      </div>
    </div>
    
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search a song — e.g. Blinding Lights">
      <button onclick="search()">ANALYZE</button>
    </div>
    
    <div id="results" class="results"></div>
    <div id="artistProfile"></div>
    <div id="dnaResult"></div>
    <div id="influencesResult"></div>
    <div id="toursResult"></div>
  </div>

  <script>
    async function search() {
      const query = document.getElementById('searchInput').value;
      if (!query) return;
      
      const resultsDiv = document.getElementById('results');
      resultsDiv.innerHTML = '<div class="loading">Searching...</div>';
      
      try {
        const res = await fetch(`/api/search?q_track=${encodeURIComponent(query)}`);
        const data = await res.json();
        const tracks = data.message?.body?.track_list || [];
        
        if (tracks.length === 0) {
          resultsDiv.innerHTML = '<div class="error">No tracks found</div>';
          return;
        }
        
        let html = '';
        tracks.slice(0, 5).forEach(item => {
          html += `<div class="result-item" onclick="selectTrack(${item.track.track_id}, '${item.track.track_name.replace(/'/g, "\\'")}', '${item.track.artist_name.replace(/'/g, "\\'")}')">
            <strong>${item.track.track_name}</strong>
            <small>${item.track.artist_name}</small>
          </div>`;
        });
        resultsDiv.innerHTML = html;
      } catch (error) {
        resultsDiv.innerHTML = `<div class="error">Error: ${error.message}</div>`;
      }
    }
    
    async function selectTrack(trackId, title, artist) {
      document.getElementById('artistProfile').innerHTML = '<div class="loading">Loading artist profile...</div>';
      document.getElementById('dnaResult').innerHTML = '<div class="loading">Analyzing DNA...</div>';
      document.getElementById('influencesResult').innerHTML = '';
      document.getElementById('toursResult').innerHTML = '';
      
      try {
        // Get lyrics
        const lyricsRes = await fetch(`/api/lyrics/${trackId}`);
        const lyricsData = await lyricsRes.json();
        const lyrics = lyricsData.message?.body?.lyrics?.lyrics_body;
        
        if (!lyrics) {
          document.getElementById('dnaResult').innerHTML = '<div class="error">No lyrics found</div>';
          return;
        }
        
        // Extract DNA
        const dnaRes = await fetch('/api/extract-dna', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ lyrics })
        });
        const dna = await dnaRes.json();
        
        // Get artist profile
        const profileRes = await fetch(`/api/artist-profile/${encodeURIComponent(artist)}`);
        const profileData = await profileRes.json();
        
        // Get influences
        const infRes = await fetch('/api/find-influences', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ dnaProfile: dna })
        });
        const influences = await infRes.json();
        
        // Get artist tours
        const toursRes = await fetch(`/api/artist-tours/${encodeURIComponent(artist)}`);
        const toursData = await toursRes.json();
        
        // Display artist profile
        if (profileData.artist) {
          const p = profileData.artist;
          let profileHtml = '<div class="artist-profile">';
          if (p.image) {
            profileHtml += `<img src="${p.image}" alt="${p.name}">`;
          }
          profileHtml += `<div class="artist-info">
            <h3>${p.name}</h3>
            <p>⭐ Popularity: ${p.popularity}/100</p>
            <p>👥 Followers: ${(p.followers / 1000000).toFixed(1)}M</p>
            <p class="genres">Genres: ${p.genres.slice(0, 3).join(', ') || 'N/A'}</p>
          </div></div>`;
          document.getElementById('artistProfile').innerHTML = profileHtml;
        }
        
        // Display DNA
        let dnaHtml = `<div class="dna-section">
          <h3>🎵 ${title}</h3>
          <small>${artist}</small>
          <strong>🧬 Lyrical DNA</strong>
          <ul>`;
        
        dna.phrases.slice(0, 5).forEach(p => {
          dnaHtml += `<li>"${p}"</li>`;
        });
        
        dnaHtml += `</ul>
          <strong>🎨 Themes Detected</strong>
          <p>${Object.keys(dna.themes).join(', ') || 'None'}</p>
          <button class="audio-button" onclick="generateSpeech('${`Lyrical DNA for ${title}: ` + dna.phrases.slice(0, 3).join('. ')}')">🔊 Hear DNA Profile</button>
        </div>`;
        document.getElementById('dnaResult').innerHTML = dnaHtml;
        
        // Display influences
        if (influences.influences.length > 0) {
          let infHtml = '<div class="influences-section"><h3>🌳 Influence Genealogy</h3><ul class="influences-list">';
          influences.influences.slice(0, 10).forEach(inf => {
            infHtml += `<li class="influence-item">
              <strong>${inf.title}</strong>
              <small>${inf.artist} • ${inf.similarity.toFixed(0)}% match</small>
            </li>`;
          });
          infHtml += '</ul></div>';
          document.getElementById('influencesResult').innerHTML = infHtml;
        }
        
        // Display tours
        if (toursData.tours && toursData.tours.length > 0) {
          let toursHtml = '<div class="tours-section"><h3>🎫 Upcoming Tours</h3>';
          toursData.tours.slice(0, 5).forEach(tour => {
            toursHtml += `<div class="tour-item">
              <strong>${tour.artist_name || artist}</strong>
              <small>${tour.venue_name} • ${new Date(tour.event_date).toLocaleDateString()}</small>
            </div>`;
          });
          toursHtml += '</div>';
          document.getElementById('toursResult').innerHTML = toursHtml;
        }
      } catch (error) {
        console.error('Error:', error);
        document.getElementById('dnaResult').innerHTML = `<div class="error">Error: ${error.message}</div>`;
      }
    }
    
    async function generateSpeech(text) {
      try {
        const res = await fetch('/api/generate-speech', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text })
        });
        
        const data = await res.json();
        if (data.audio) {
          const audio = new Audio(data.audio);
          audio.play();
        }
      } catch (error) {
        alert('Error generating speech: ' + error.message);
      }
    }
    
    document.getElementById('searchInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') search();
    });
  </script>
</body>
</html>
